services:
  omeka:
    image: nealpowers104/exploreuk-web-app:${EUK_TAG}
    env_file:
      - .env.prod
    networks:
        - app_network
    volumes:
      - omeka_static:/omeka
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  findingaid:
    env_file:
      - .env.prod
    image: nealpowers104/findingaid:${FA_TAG}
    volumes:
      - findingaid:/app
      - ./xml:/app/xml:ro
    networks:
      - app_network
    restart: unless-stopped

  web:
    image: nginx:1.29.0
    networks:
      - app_network
    volumes:
      - omeka_static:/omeka
      - findingaid:/findingaid
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - omeka
    restart: unless-stopped

  db:
    image: mysql:9.4.0
    env_file:
      - .env.prod
    environment:
      MYSQL_USER_FILE: /run/secrets/mysql_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE_FILE: /run/secrets/mysql_database
    secrets:
      - mysql_user
      - mysql_password
      - mysql_root_password
      - mysql_database
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    restart: unless-stopped

secrets:
  mysql_user:
    file: ${SECRETS_DIR}/mysql_user.txt
  mysql_password:
    file: ${SECRETS_DIR}/mysql_password.txt
  mysql_root_password:
    file: ${SECRETS_DIR}/mysql_root_password.txt
  mysql_database:
    file: ${SECRETS_DIR}/mysql_database.txt

volumes:
  db_data:
  omeka_static:
  findingaid:

networks:
  app_network:
    driver: bridge
