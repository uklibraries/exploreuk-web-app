name: CI
on:
  pull_request:
    branches: [ "dev" ]
  push:
    branches: [ "dev" ]

jobs:
  run-php-unit:

    runs-on: ubuntu-latest
    env:
      COMPOSE_FILE: docker-compose.yml:docker-compose.ci.override.yml
      COMPOSE_PROJECT_NAME: ci

    steps:
      - uses: actions/checkout@v4

      - name: Build services
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Run tests inside app container
        run: docker compose run --rm -T omeka /vendor/bin/phpunit -c /phpunit.xml /tests

      - name: Show service logs if failed
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down -v --remove-orphans
